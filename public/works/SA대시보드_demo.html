<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Dealer SA 성과 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#f0f3fa;--border:#e2e7f2;--border2:#cdd5e8;
  --text:#1a1d2e;--text2:#5a6076;--text3:#9da3b8;
  --accent:#2563eb;--accent-light:#eff4ff;--accent-mid:rgba(37,99,235,0.1);
  --green:#059669;--green-light:#ecfdf5;--red:#dc2626;--red-light:#fef2f2;
  --yellow:#d97706;--yellow-light:#fffbeb;--purple:#7c3aed;--purple-light:#f5f3ff;
  --cyan:#0891b2;--cyan-light:#ecfeff;
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:13px 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.header-title{font-size:14px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:10px;color:var(--text3);margin-top:1px}
.updated-at{font-size:11px;color:var(--text2);font-family:var(--mono);background:var(--surface2);padding:3px 9px;border-radius:5px;font-weight:600}
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:7px}
.filter-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap}
.f-divider{width:1px;height:22px;background:var(--border2)}
.chip-row{display:flex;gap:3px;flex-wrap:wrap}
.chip{padding:4px 11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--sans);transition:all 0.13s;white-space:nowrap}
.chip:hover{background:var(--surface2);color:var(--text)}
.chip.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
.chip.in-range{background:var(--accent-mid);border-color:var(--accent);color:var(--accent)}
.chip.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none}
.chip.ins-active{background:var(--purple);border-color:var(--purple);color:white;font-weight:600}
.range-hint{font-size:11px;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:5px;font-weight:500;white-space:nowrap}
.view-tabs{display:flex;gap:4px}
.view-tab{padding:4px 11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--sans);transition:all 0.13s}
.view-tab:hover{background:var(--surface2);color:var(--text)}
.view-tab.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
.sticky-top{position:sticky;top:0;z-index:100;background:var(--bg)}
.sticky-top{position:sticky;top:0;z-index:99;background:var(--bg);padding:0 28px 10px;border-bottom:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.main{padding:14px 28px}
.kpi-header{background:var(--surface);border:1px solid var(--border);border-radius:0 0 12px 12px;padding:14px 20px;box-shadow:var(--shadow);margin-bottom:0;border-top:none}
.kpi-wrapper{padding:0 28px 14px;background:var(--bg)}
.kpi-wrap{padding:10px 28px 10px;background:var(--bg);border-bottom:1px solid var(--border)}
.kpi-header-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.kpi-header-title::after{content:'';flex:1;height:1px;background:var(--border)}
.kpi-row{display:grid;grid-template-columns:0.8fr 0.8fr 0.2fr 1fr 1fr 1fr 0.2fr 1fr 1fr 0.2fr 1fr 1fr;gap:6px;align-items:stretch}
.kpi-item{display:flex;flex-direction:column;gap:2px;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);position:relative;overflow:hidden;transition:box-shadow 0.15s}
.kpi-item::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 10px 10px}
.kpi-item:hover{box-shadow:var(--shadow-md)}
.kpi-item-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:1px}
.kpi-item-value{font-size:24px;font-weight:800;font-family:var(--mono);letter-spacing:-0.5px;line-height:1;text-align:center}
.sa-kpi-row{padding:6px 28px 8px;background:var(--surface2);border-bottom:1px solid var(--border);display:none;animation:fadeIn 0.18s ease}
.sa-kpi-row.visible{display:block}
.sa-kpi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sa-kpi-who{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--text2)}
.sa-kpi-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;flex-shrink:0}
.sa-kpi-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 6px;border-radius:4px;font-family:var(--sans)}
.sa-kpi-close:hover{background:var(--border);color:var(--text)}
.sa-kpi-grid{display:grid;grid-template-columns:0.8fr 0.8fr 0.2fr 1fr 1fr 1fr 0.2fr 1fr 1fr 0.2fr 1fr 1fr;gap:6px;align-items:stretch}
.sa-kpi-item{display:flex;flex-direction:column;gap:1px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);position:relative;overflow:hidden;background:var(--surface)}
.sa-kpi-item::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 7px 7px}
.sa-kpi-item.k-gray::after{background:#64748b}.sa-kpi-item.k-blue::after{background:var(--accent)}
.sa-kpi-item.k-orange::after{background:#ea580c}.sa-kpi-item.k-green::after{background:var(--green)}
.sa-kpi-lbl{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.sa-kpi-val{font-size:16px;font-weight:800;font-family:var(--mono);letter-spacing:-0.5px;line-height:1.1}
.sa-kpi-diff{font-size:9px;font-weight:600;margin-top:1px}
.sa-kpi-diff.up{color:var(--accent)}.sa-kpi-diff.down{color:var(--red)}.sa-kpi-diff.same{color:var(--text3)}
.kpi-item-sub{font-size:9px;color:var(--text3);margin-top:2px;text-align:right}
.kpi-item.blue{border-color:rgba(37,99,235,0.25);background:linear-gradient(135deg,rgba(37,99,235,0.07),rgba(37,99,235,0.02))}
.kpi-item.blue::after{background:var(--accent)}
.kpi-item.green{border-color:rgba(5,150,105,0.25);background:linear-gradient(135deg,rgba(5,150,105,0.07),rgba(5,150,105,0.02))}
.kpi-item.green::after{background:var(--green)}
.kpi-item.yellow{border-color:rgba(217,119,6,0.25);background:linear-gradient(135deg,rgba(217,119,6,0.07),rgba(217,119,6,0.02))}
.kpi-item.yellow::after{background:var(--yellow)}
.kpi-item.purple{border-color:rgba(124,58,237,0.25);background:linear-gradient(135deg,rgba(124,58,237,0.07),rgba(124,58,237,0.02))}
.kpi-item.purple::after{background:var(--purple)}
.kpi-item.cyan{border-color:rgba(8,145,178,0.25);background:linear-gradient(135deg,rgba(8,145,178,0.07),rgba(8,145,178,0.02))}
.kpi-item.cyan::after{background:var(--cyan)}
.kpi-item.red{border-color:rgba(220,38,38,0.25);background:linear-gradient(135deg,rgba(220,38,38,0.07),rgba(220,38,38,0.02))}
.kpi-item.red::after{background:var(--red)}
/* KPI 그룹 색상 */
.kpi-item.k-gray{border-color:rgba(100,116,139,0.25);background:linear-gradient(135deg,rgba(100,116,139,0.07),rgba(100,116,139,0.02))}
.kpi-item.k-gray::after{background:#64748b}
.kpi-item.k-blue{border-color:rgba(37,99,235,0.25);background:linear-gradient(135deg,rgba(37,99,235,0.07),rgba(37,99,235,0.02))}
.kpi-item.k-blue::after{background:var(--accent)}
.kpi-item.k-orange{border-color:rgba(234,88,12,0.25);background:linear-gradient(135deg,rgba(234,88,12,0.07),rgba(234,88,12,0.02))}
.kpi-item.k-orange::after{background:#ea580c}
.kpi-item.k-green{border-color:rgba(5,150,105,0.25);background:linear-gradient(135deg,rgba(5,150,105,0.07),rgba(5,150,105,0.02))}
.kpi-item.k-green::after{background:var(--green)}
.sa-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sa-list-title{font-size:12px;font-weight:700;color:var(--text2)}
.sa-count{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:4px;font-family:var(--mono)}
.sa-table-head{display:grid;grid-template-columns:36px 1.1fr 0.5fr 0.5fr 2fr 0.9fr 1fr 1fr 1fr 1fr 0.7fr;gap:8px;align-items:center;padding:4px 16px;margin-bottom:2px}
.sa-th{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;text-align:center}
.sa-th:nth-child(2){text-align:left}
.sa-grid{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.sa-row{display:grid;grid-template-columns:36px 1.1fr 0.5fr 0.5fr 2fr 0.9fr 1fr 1fr 1fr 1fr 0.7fr;gap:8px;align-items:center;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.12s;box-shadow:var(--shadow)}
.sa-row:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.sa-row.selected{border-color:var(--accent);background:var(--accent-light)}
.sa-rank{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--text3);text-align:center}
.sa-rank.r1{color:#b7960c}.sa-rank.r2{color:#6b7280}.sa-rank.r3{color:#92400e}
.sa-name-wrap{display:flex;align-items:center;gap:9px}
.sa-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.sa-nm{font-size:13px;font-weight:600}
.sa-br{font-size:10px;color:var(--text3)}
.sa-gubn{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;background:var(--accent-light);color:var(--accent)}
.sa-gubn.ins{background:var(--purple-light);color:var(--purple)}
.sa-cell{text-align:center}
.sa-cell-v{font-size:12px;font-weight:600;font-family:var(--mono)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--mono)}
.badge.high{background:var(--green-light);color:var(--green)}
.badge.mid{background:var(--yellow-light);color:var(--yellow)}
.badge.low{background:var(--red-light);color:var(--red)}
.badge.none{background:var(--surface2);color:var(--text3)}
.sales-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.sales-stack{display:flex;width:100%;height:8px;border-radius:4px;overflow:hidden;gap:1px}
.sales-seg{height:100%;min-width:2px;transition:width 0.3s}
.sales-val{font-size:12px;font-weight:600;font-family:var(--mono)}
.sales-bg{width:80px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.sales-fill{height:100%;background:var(--accent);border-radius:2px}
.detail-btn{padding:4px 10px;border:1px solid var(--border2);border-radius:5px;background:transparent;cursor:pointer;font-size:11px;color:var(--text2);font-family:var(--sans);transition:all 0.12s;white-space:nowrap}
.detail-btn:hover{background:var(--accent);color:white;border-color:var(--accent)}
.pos-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.card-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--text3)}
.pos-container{position:relative;height:320px}
.pos-expand-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.9);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:10;transition:all 0.15s;color:var(--text2);box-shadow:var(--shadow)}
.pos-expand-btn:hover{background:var(--accent);color:white;border-color:var(--accent)}
#pos-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#pos-modal.open{display:flex}
#pos-modal-box{background:var(--surface);border-radius:16px;padding:22px 24px;width:90vw;height:85vh;display:flex;flex-direction:column;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
#pos-modal-close{position:absolute;top:12px;right:14px;width:30px;height:30px;border-radius:7px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all 0.15s;line-height:1}
#pos-modal-close:hover{background:var(--red-light);color:var(--red);border-color:var(--red)}
#pos-modal-body{flex:1;position:relative;min-height:0;margin-top:14px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
.chart-container{position:relative;height:190px}
.sales-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;border-bottom:2px solid var(--border);background:var(--surface2)}
.stbl td{padding:9px 10px;border-bottom:1px solid var(--border)}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--surface2)}
.num{font-family:var(--mono);text-align:right}
.type-badge{display:inline-block;font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:4px;font-weight:600}
.bar-cell{width:90px}
.bar-wrap{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--border2);border-radius:7px;background:transparent;cursor:pointer;font-size:12px;font-family:var(--sans);color:var(--text2);margin-bottom:16px;transition:all 0.12s}
.back-btn:hover{background:var(--surface2)}
.detail-hero{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.detail-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;flex-shrink:0}
.dkpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.dkpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.dkpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dkpi.blue::before{background:var(--accent)}.dkpi.green::before{background:var(--green)}
.dkpi.yellow::before{background:var(--yellow)}.dkpi.purple::before{background:var(--purple)}
.dkpi.cyan::before{background:var(--cyan)}.dkpi.red::before{background:var(--red)}
.dkpi-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.dkpi-value{font-size:20px;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px;line-height:1}
.dkpi-sub{font-size:10px;color:var(--text3);margin-top:4px}
.metric-compare-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.metric-compare-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.mc-item{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.mc-item::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mc-item.mc-blue::before{background:var(--accent)}.mc-item.mc-orange::before{background:#ea580c}
.mc-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px}
.mc-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px}
.mc-who{font-size:10px;font-weight:600;color:var(--text2)}
.mc-val{font-size:18px;font-weight:700;font-family:var(--mono);letter-spacing:-0.5px}
.mc-val.sa-val{color:var(--accent)}.mc-val.br-val{color:var(--text3);font-size:13px}
.mc-divider{height:1px;background:var(--border);margin:6px 0}
.mc-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;margin-top:6px}
.mc-badge.up{background:#ecfdf5;color:var(--green)}.mc-badge.down{background:#fef2f2;color:var(--red)}.mc-badge.same{background:var(--surface2);color:var(--text3)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:40vh;color:var(--text3);gap:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease}
#pw-overlay{position:fixed;inset:0;background:#f4f6fb;display:flex;align-items:center;justify-content:center;z-index:9999}
.pw-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.1);text-align:center}
.pw-logo{width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.pw-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.pw-sub{font-size:12px;color:var(--text3);margin-bottom:22px}
.pw-inp{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:8px;font-size:14px;font-family:var(--mono);outline:none;box-sizing:border-box;letter-spacing:2px;transition:border-color .15s}
.pw-inp:focus{border-color:var(--accent)}
.pw-inp.shake{animation:shake .3s ease;border-color:var(--red)}
.pw-btn{width:100%;padding:10px;margin-top:12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.pw-btn:hover{opacity:.88}
.pw-msg{font-size:12px;color:var(--red);margin-top:8px;min-height:16px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>

<script>
const RAW=window.__DATA__;
// ── 타겟 기준 ──────────────────────────────────────────────────────────────────
const TARGET={CCR:8.2,CIU:7.8,NPS:85,GKL:85};
function tc(v,tgt){if(v===null||v===undefined)return'var(--text3)';return v>=tgt?'var(--accent)':'var(--red)';}
function ta(v,tgt){if(v===null||v===undefined)return'';const ok=v>=tgt;return`<span style="font-size:10px;font-weight:700;color:${ok?'var(--accent)':'var(--red)'};">${ok?'▲':'▼'} TGT ${tgt}</span>`;}
let currentView='sa',selYear='',selMonthStart=null,selMonthEnd=null,pickStep=0,selBranch='',selGubn='',selSalesTypes=new Set(),selectedSA=null,charts={};
const ACOLORS=['#2563eb','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d'];
function avatarColor(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%ACOLORS.length;return ACOLORS[h];}

  // 업데이트 기준 안내
function init(){
  document.getElementById('updatedAt').innerHTML='데이터 업데이트 기준<br>-입고·매출·VoC : 2026년 3월 마감<br>-CCR·CIU : 2026년 3월 마감';
  const data=RAW.branch||[];
  const allM=[...new Set(data.map(r=>r['연월']))].sort();
  const years=[...new Set(allM.map(m=>m.slice(0,4)))].sort();
  const branches=['지점 A','지점 B','지점 C','지점 D','지점 E','지점 F','지점 G'];

  // 연도 탭
  const yt=document.getElementById('yearTabs');
  years.forEach(y=>{const b=document.createElement('button');b.className='chip';b.textContent=y;b.dataset.year=y;b.onclick=()=>selectYear(y);yt.appendChild(b);});

  // 지점 탭
  const bt=document.getElementById('branchTabs');
  const ab=document.createElement('button');ab.className='chip active';ab.textContent='전체(SCL)';ab.dataset.branch='';ab.onclick=()=>selectBranch('');bt.appendChild(ab);
  branches.forEach(br=>{const b=document.createElement('button');b.className='chip';b.textContent=br;b.dataset.branch=br;b.onclick=()=>selectBranch(br);bt.appendChild(b);});

  // 구분 탭
  const gt=document.getElementById('gubnTabs');
  [{label:'전체',val:''},{label:'일반',val:'일반'},{label:'보험',val:'보험'}].forEach(g=>{
    const b=document.createElement('button');
    b.className='chip'+(g.val===''?' active':'');
    b.textContent=g.label;b.dataset.gubn=g.val;
    b.onclick=()=>selectGubn(g.val);gt.appendChild(b);
  });

  // 매출 타입 탭 (멀티셀렉트)
  const st=document.getElementById('salesTypeTabs');
  [{label:'전체',val:''},{label:'Retail',val:'Retail'},{label:'BSI',val:'BSI'},
   {label:'Warranty',val:'Warranty'},{label:'Insurance',val:'Insurance'},
   {label:'Internal',val:'Internal'},{label:'상품',val:'상품'}].forEach(t=>{
    const b=document.createElement('button');
    b.className='chip'+(t.val===''?' active':'');
    b.textContent=t.label;b.dataset.stype=t.val;
    b.onclick=()=>selectSalesType(t.val);st.appendChild(b);
  });

  if(years.length)selectYear(years[years.length-1]);
}

function selectYear(y){
  selYear=y;selMonthStart=null;selMonthEnd=null;pickStep=0;
  document.querySelectorAll('.chip[data-year]').forEach(b=>b.className='chip'+(b.dataset.year===y?' active':''));
  buildMonthGrid(y);
}
function selectBranch(br){
  selBranch=br;
  document.querySelectorAll('[data-branch]').forEach(b=>b.className='chip'+(b.dataset.branch===br?' active':''));
  applyFilters();
}
function selectSalesType(t){
  if(t===''){
    selSalesTypes.clear();
  } else {
    if(selSalesTypes.has(t))selSalesTypes.delete(t);
    else selSalesTypes.add(t);
  }
  document.querySelectorAll('[data-stype]').forEach(b=>{
    const isAll=b.dataset.stype==='';
    b.className='chip'+((isAll&&selSalesTypes.size===0)||selSalesTypes.has(b.dataset.stype)?' active':'');
  });
  applyFilters();
}
function selectGubn(g){
  selGubn=g;
  document.querySelectorAll('[data-gubn]').forEach(b=>{
    const isActive=b.dataset.gubn===g;
    b.className='chip'+(isActive?(g==='보험'?' ins-active':' active'):'');
  });
  applyFilters();
}
function buildMonthGrid(y){
  const avail=new Set((RAW.branch||[]).map(r=>r['연월']).filter(m=>m.startsWith(y)));
  const grid=document.getElementById('monthGrid');grid.innerHTML='';
  for(let m=1;m<=12;m++){
    const mm=String(m).padStart(2,'0'),ym=`${y}-${mm}`;
    const btn=document.createElement('button');
    btn.className='chip'+(avail.has(ym)?'':' disabled');btn.textContent=m+'월';btn.dataset.ym=ym;
    if(avail.has(ym))btn.onclick=()=>clickMonth(ym);
    grid.appendChild(btn);
  }
  updateMonthStyles();applyFilters();
}
function clickMonth(ym){
  if(pickStep===0){selMonthStart=ym;selMonthEnd=null;pickStep=1;}
  else{if(ym===selMonthStart){selMonthEnd=null;pickStep=0;}else{if(ym<selMonthStart){selMonthEnd=selMonthStart;selMonthStart=ym;}else selMonthEnd=ym;pickStep=0;}}
  updateMonthStyles();applyFilters();
}
function updateMonthStyles(){
  const hint=document.getElementById('rangeHint');
  document.querySelectorAll('#monthGrid .chip:not(.disabled)').forEach(btn=>{
    const ym=btn.dataset.ym;let cls='chip';
    if(selMonthStart&&selMonthEnd){if(ym===selMonthStart||ym===selMonthEnd)cls+=' active';else if(ym>selMonthStart&&ym<selMonthEnd)cls+=' in-range';}
    else if(selMonthStart&&ym===selMonthStart)cls+=' active';
    btn.className=cls;
  });
  if(selMonthStart&&selMonthEnd){hint.textContent=fYm(selMonthStart)+' ~ '+fYm(selMonthEnd);hint.style.display='';}
  else if(selMonthStart&&pickStep===1){hint.textContent=fYm(selMonthStart)+' 선택 → 종료월';hint.style.display='';}
  else if(selMonthStart){hint.textContent=fYm(selMonthStart);hint.style.display='';}
  else hint.style.display='none';
}
function fYm(ym){return ym?ym.slice(0,4)+'년 '+parseInt(ym.slice(5))+'월':'';}
function getRange(){
  const yms=[...new Set((RAW.branch||[]).map(r=>r['연월']).filter(m=>m.startsWith(selYear)))].sort();
  if(!yms.length)return{s:'',e:''};
  return{s:selMonthStart||yms[0],e:selMonthEnd||(selMonthStart?selMonthStart:yms[yms.length-1])};
}
function setView(v){
  currentView=v;
  // 뷰 탭 active 상태 명시적으로 처리
  const viewMap={sa:'btnSA',sadetail:'btnSadetail'};
  Object.entries(viewMap).forEach(([key,btnId])=>{
    const el=document.getElementById(btnId);
    if(el)el.className='view-tab'+(v===key?' active':'');
  });
  document.getElementById('btnSadetail').style.display=(v==='sadetail')?'':'none';
  applyFilters();
}
function applyFilters(){
  if(!RAW)return;
  const{s,e}=getRange();if(!s)return;
  if(currentView==='sa'){renderSACompare(selBranch,s,e);if(selectedSA)showSAKpiRow(selectedSA.id,selectedSA.branch,selectedSA.name,s,e);}
  else if(currentView==='sadetail'&&selectedSA){
    const _alreadyRendered=!!document.getElementById('metricCompareGrid');
    if(!_alreadyRendered){
      renderSADetail(selectedSA,s,e);
    } else {
      const _d=(RAW.sa||[]).filter(r=>r['SA_ID']===selectedSA.id&&r['지점_단순']===selectedSA.branch&&r['연월']>=s&&r['연월']<=e);
      const _m=(()=>{const months=[];let cur=s;while(cur<=e){months.push(cur);const[y,m]=cur.split('-').map(Number);cur=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}return months;})();
      const _bKPI=fd(RAW.branch,selectedSA.branch,s,e);
      renderKPISlotMixed(_bKPI,_bKPI,selectedSA.branch);
      if(charts.sales){charts.sales.destroy();charts.sales=null;}
      if(charts.ro){charts.ro.destroy();charts.ro=null;}
      rSales(_d,_m,selSalesTypes);
      rRO(_d,_m);
      rMetricCompare(_d,selectedSA.branch,s,e,selSalesTypes);
      rTbl(_d);
    }
  }
}

// ── 헬퍼 ──────────────────────────────────────────────────────────────────────
function fd(data,tb,s,e){return data.filter(r=>r['연월']>=s&&r['연월']<=e&&r['지점_단순']===(tb||'SCL'));}
function avg(d,src,grp){const rows=d.filter(r=>r['소스']===src&&r['구분']===grp),vals=rows.map(r=>r['값']).filter(v=>v!==null&&v!==undefined&&v!=='');return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):null;}
function sm(d,src,grp,f='값'){return d.filter(r=>r['소스']===src&&r['구분']===grp).reduce((s,r)=>s+(r[f]||0),0);}
function fM(v){if(!v&&v!==0)return'—';if(v>=1e6)return Math.round(v/1e6).toLocaleString('ko-KR');return v.toLocaleString('ko-KR')}
function fF(v){return(v||v===0)?Math.round(v).toLocaleString('ko-KR'):'—'}
function fP(v){return v!==null&&v!==undefined?v.toFixed(1)+'%':'—'}
function fN(v,d=1){return v!==null&&v!==undefined?(+v).toFixed(d):'—'}
function bdg(v,tgt){
  if(v===null||v===undefined)return`<span class="badge none">—</span>`;
  const ok=v>=tgt;
  return`<span style="display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;font-family:var(--mono);background:${ok?'rgba(37,99,235,0.1)':'rgba(220,38,38,0.1)'};color:${ok?'var(--accent)':'var(--red)'};border:1px solid ${ok?'rgba(37,99,235,0.2)':'rgba(220,38,38,0.2)'}">${(+v).toFixed(1)}</span>`;
}
function bdgPct(v,ref){
  if(v===null||v===undefined)return`<span class="badge none">—</span>`;
  if(ref!==undefined&&ref!==null){
    const ok=v>=ref;
    return`<span style="display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;font-family:var(--mono);background:${ok?'rgba(37,99,235,0.1)':'rgba(220,38,38,0.1)'};color:${ok?'var(--accent)':'var(--red)'};border:1px solid ${ok?'rgba(37,99,235,0.2)':'rgba(220,38,38,0.2)'}">${v.toFixed(1)}%</span>`;
  }
  return`<span class="badge ${v>=20?'high':v>=10?'mid':'low'}">${v.toFixed(1)}%</span>`;
}
function bdgGKL(v){
  if(v===null||v===undefined)return`<span class="badge none">—</span>`;
  const ok=v>=TARGET.GKL;
  return`<span style="display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;font-family:var(--mono);background:${ok?'rgba(37,99,235,0.1)':'rgba(220,38,38,0.1)'};color:${ok?'var(--accent)':'var(--red)'};border:1px solid ${ok?'rgba(37,99,235,0.2)':'rgba(220,38,38,0.2)'}">${Math.round(v)}</span>`;
}
function bdgNPS(v){
  if(v===null||v===undefined)return`<span class="badge none">—</span>`;
  const ok=v>=TARGET.NPS;
  return`<span style="display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;font-family:var(--mono);background:${ok?'rgba(37,99,235,0.1)':'rgba(220,38,38,0.1)'};color:${ok?'var(--accent)':'var(--red)'};border:1px solid ${ok?'rgba(37,99,235,0.2)':'rgba(220,38,38,0.2)'}">${Math.round(v)}</span>`;
}

// ── KPI 슬롯 (고정 영역 안에 렌더) ───────────────────────────────────────────
function renderKPISlotMixed(salesData,kpiData,label){
  const comein=sm(kpiData,'입고','입고대수');
  const _st=[...selSalesTypes];
  const sales=_st.length>0?_st.reduce((s,t)=>s+sm(salesData,'Raw',t),0):sm(salesData,'Raw','전체');
  const margin=_st.length>0?_st.reduce((s,t)=>s+sm(salesData,'Raw',t,'마진'),0):sm(salesData,'Raw','전체','마진');
  const mr=sales?(margin/sales*100):null;

const STYPE_KEY={'Retail':'retail','BSI':'bsi','Warranty':'warranty','Insurance':'insurance','Internal':'internal','상품':'product'};
function getSalesVal(sa,types){
  if(!types||types.size===0)return sa.sales;
  return[...types].reduce((s,t)=>s+(sa[STYPE_KEY[t]]||0),0);
}
function getMarginVal(sa,types){
  if(!types||types.size===0)return sa.margin;
  const sv=getSalesVal(sa,types);
  return sa.sales?(sa.margin*sv/sa.sales):0;
}
function buildSalesStack(sa){
  if(!sa.sales)return'';
  const allTypes=[
    {v:sa.retail,   c:'#BDC8FF', label:'Retail'},
    {v:sa.bsi,      c:'#000000', label:'BSI'},
    {v:sa.warranty, c:'#98ACFE', label:'Warranty'},
    {v:sa.insurance,c:'#276AF2', label:'Insurance'},
    {v:sa.internal, c:'#db2777', label:'Internal'},
    {v:sa.product,  c:'#f59e0b', label:'상품'},
  ];
  const active=selSalesTypes.size>0?allTypes.filter(t=>selSalesTypes.has(t.label)):allTypes;
  const total=active.reduce((s,t)=>s+t.v,0);
  if(!total)return`<div style="font-size:10px;color:var(--text3)">—</div>`;
  return active.filter(t=>t.v>0).map(t=>{
    const pct=(t.v/total*100).toFixed(1);

}

function showSAKpiRow(id,branch,name,s,e){
  const el=document.getElementById('saKpiRow');

  const brData=fd(RAW.branch,branch,s,e);
  const _st=[...selSalesTypes];
  const saComein=sm(saData,'입고','입고대수');
  const saSales=_st.length>0?_st.reduce((a,t)=>a+sm(saData,'Raw',t),0):sm(saData,'Raw','전체');
  const saMgn=_st.length>0?_st.reduce((a,t)=>a+sm(saData,'Raw',t,'마진'),0):sm(saData,'Raw','전체','마진');
  const saMR=saSales?(saMgn/saSales*100):null;
  const saRO=_st.length>0?_st.reduce((a,t)=>a+(sm(saData,'Raw',t,'건수')||0),0):sm(saData,'Raw','전체','건수');
  const saLBR=avg(saData,'Raw','공임비중');
  const saNPS=avg(saData,'VoC','NPS'),saGKL=avg(saData,'VoC','GKL_NPS');
  const saCCR=avg(saData,'PE','CCR'),saCIU=avg(saData,'PE','CIU');
  const brComein=sm(brData,'입고','입고대수');
  const brSales=_st.length>0?_st.reduce((a,t)=>a+sm(brData,'Raw',t),0):sm(brData,'Raw','전체');
  const brMgn=_st.length>0?_st.reduce((a,t)=>a+sm(brData,'Raw',t,'마진'),0):sm(brData,'Raw','전체','마진');
  const brMR=brSales?(brMgn/brSales*100):null;
  const brRO=_st.length>0?_st.reduce((a,t)=>a+(sm(brData,'Raw',t,'건수')||0),0):sm(brData,'Raw','전체','건수');
  const brLBR=avg(brData,'Raw','공임비중');
  const brNPS=avg(brData,'VoC','NPS'),brGKL=avg(brData,'VoC','GKL_NPS');
  const brCCR=avg(brData,'PE','CCR'),brCIU=avg(brData,'PE','CIU');
  function diff(sv,bv,higherBetter,fmt,tgt){
    if(sv===null||bv===null)return'<span class="sa-kpi-diff same">—</span>';
    const d=sv-bv;
    if(Math.abs(d)<0.05)return'<span class="sa-kpi-diff same">≈ 지점</span>';
    // 타겟 있으면 타겟 대비 색상, 없으면 지점 대비 색상
    const isGood=tgt!==undefined?(sv>=tgt):(higherBetter?d>0:d<0);
    const cls=isGood?'up':'down';
    const arrow=d>0?'▲':'▼';
    return'<span class="sa-kpi-diff '+cls+'">'+arrow+' '+fmt(Math.abs(d))+'</span>';
  }
  const fC=v=>Math.round(v).toLocaleString('ko-KR');
  const fP1=v=>v.toFixed(1)+'%';
  const fN1=v=>v.toFixed(1);
  const fNR=v=>Math.round(v)+'';
  const color=avatarColor(name);
  function item(cls,lbl,sv,fmt,dispFn,higherBetter,bv,tgt){
    const disp=sv!==null?dispFn(sv):'—';
    const valColor=tgt!==undefined?tc(sv,tgt):'var(--text)';
    return'<div class="sa-kpi-item '+cls+'">'+
      '<div class="sa-kpi-lbl">'+lbl+'</div>'+
      '<div class="sa-kpi-val" style="color:'+valColor+'">'+disp+'</div>'+
      diff(sv,bv,higherBetter,fmt,tgt)+
    '</div>';
  }
  function divider(){return'<div style="display:flex;align-items:center;justify-content:center"><div style="width:1px;height:60%;background:var(--border2);border-radius:1px"></div></div>';}
  const pct=brSales>0?(saSales/brSales*100):null;
  const saAdv=saRO>0?(saSales/saRO):null;
  const dispAmt=saSales?Math.round(saSales/1e6).toLocaleString('ko-KR'):'—';
  const dispAdv=saAdv!==null?'(객단가 '+Math.round(saAdv/1e4).toLocaleString('ko-KR')+'만원)':'';
  const dispPct=pct!==null?'지점 '+pct.toFixed(1)+'%':'—';
  // 입고·RO 비중
  const comeinPct=brComein>0?(saComein/brComein*100):null;
  const roPct=brRO>0?(saRO/brRO*100):null;
  el.innerHTML=
    '<div class="sa-kpi-header">'+
      '<div class="sa-kpi-who">'+
        '<div class="sa-kpi-avatar" style="background:'+color+'">'+name[0]+'</div>'+
        '<span>'+name+' · '+branch+'</span>'+
        '<span style="font-size:10px;color:var(--text3);font-weight:400">지점 대비</span>'+
      '</div>'+
      '<button class="sa-kpi-close" onclick="hideSAKpiRow()">✕ 닫기</button>'+
    '</div>'+
    '<div class="sa-kpi-grid">'+
      '<div class="sa-kpi-item k-gray">'+
        '<div class="sa-kpi-lbl">입고(MBO)</div>'+
        '<div class="sa-kpi-val" style="font-size:14px">'+(saComein?saComein.toLocaleString()+'대':'—')+'</div>'+
        '<span class="sa-kpi-diff same">'+(comeinPct!==null?'지점 '+comeinPct.toFixed(1)+'%':'—')+'</span>'+
      '</div>'+
      '<div class="sa-kpi-item k-gray">'+
        '<div class="sa-kpi-lbl">RO개수</div>'+
        '<div class="sa-kpi-val" style="font-size:14px">'+(saRO?saRO.toLocaleString()+'건':'—')+'</div>'+
        '<span class="sa-kpi-diff same">'+(roPct!==null?'지점 '+roPct.toFixed(1)+'%':'—')+'</span>'+
      '</div>'+
      divider()+
      '<div class="sa-kpi-item k-blue">'+
        '<div class="sa-kpi-lbl">누적 매출</div>'+
        '<div class="sa-kpi-val" style="font-size:15px">'+dispAmt+'<span style="font-size:10px;font-weight:500;color:var(--text3);margin-left:2px">백만원</span></div>'+
        '<div style="font-size:9px;color:var(--text3);margin-top:1px">'+dispAdv+'</div>'+
        '<span class="sa-kpi-diff same">'+dispPct+'</span>'+
      '</div>'+
      item('k-blue','공임율',saLBR,fP1,fP1,true,brLBR)+
      item('k-blue','마진율',saMR,fP1,fP1,true,brMR)+
      divider()+
      item('k-orange','NPS',saNPS,fNR,fNR,true,brNPS,TARGET.NPS)+
      item('k-orange','GKL NPS',saGKL,fNR,fNR,true,brGKL,TARGET.GKL)+
      divider()+

      item('k-green','CIU',saCIU,fN1,fN1,true,brCIU,TARGET.CIU)+
    '</div>';
  el.classList.add('visible');
}

function rCCR(data,months){

    const{ctx,chartArea:{left,right,top,bottom},scales:{y}}=chart;
    // CCR 타겟선
    const pyCCR=y.getPixelForValue(TARGET.CCR);
    const pyCIU=y.getPixelForValue(TARGET.CIU);
    ctx.save();
    // CCR 타겟 미만 배경

    {label:'CCR',data:mk('CCR'),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.07)',tension:0.4,fill:true,pointRadius:4,pointBackgroundColor:'#2563eb'},

function rMetricCompare(saData,branch,s,e,stypes){
  const allRawTypes=['Retail','BSI','Warranty','Insurance','Internal','상품'];
  const activeTypes=(stypes&&stypes.size>0)?[...stypes]:allRawTypes;
  const saSales=activeTypes.reduce((acc,t)=>acc+sm(saData,'Raw',t),0);
  const saCnt=sm(saData,'Raw','전체','건수');
  const saLBR=avg(saData,'Raw','공임비중');
  const brData=(RAW.branch||[]).filter(r=>r['지점_단순']===branch&&r['연월']>=s&&r['연월']<=e);
  const brSales=activeTypes.reduce((acc,t)=>acc+sm(brData,'Raw',t),0);
  const brCnt=sm(brData,'Raw','전체','건수');
  const brLBR=avg(brData,'Raw','공임비중');
  function diffBadge(saV,brV,higherIsBetter){
    if(saV===null||brV===null)return'';
    const d=saV-brV;
    if(Math.abs(d)<0.1)return'<span class="mc-badge same">≈ 지점 동일</span>';
    const isUp=higherIsBetter?d>0:d<0;
    const arrow=d>0?'▲':'▼';
    const cls=isUp?'up':'down';
    const absD=Math.abs(d);
    const dispD=absD>=1000?Math.round(absD).toLocaleString('ko-KR'):absD.toFixed(1);
    return'<span class="mc-badge '+cls+'">'+arrow+' '+dispD+'</span>';
  }
  function mcItem(cls,label,saV,brV,fmt,unit,higherIsBetter){
    const saDisp=saV!==null?fmt(saV)+unit:'—';
    const brDisp=brV!==null?fmt(brV)+unit:'—';
    return'<div class="mc-item '+cls+'">'+
      '<div class="mc-label">'+label+'</div>'+
      '<div class="mc-row"><span class="mc-who">SA</span><span class="mc-val sa-val">'+saDisp+'</span></div>'+
      '<div class="mc-divider"></div>'+
      '<div class="mc-row"><span class="mc-who">'+branch+' 지점</span><span class="mc-val br-val">'+brDisp+'</span></div>'+
      diffBadge(saV,brV,higherIsBetter)+
    '</div>';
  }
  const fComma=v=>Math.round(v).toLocaleString('ko-KR');
  const fPct=v=>v.toFixed(1);
  // 입고(MBO)
  const saComein=sm(saData,'입고','입고대수');
  const brComein=sm(brData,'입고','입고대수');
  // RO개수 (선택 타입 기준)
  const ROKEY={Retail:'roRetail',BSI:'roBSI',Warranty:'roWarranty',Insurance:'roInsurance',Internal:'roInternal'};
  // 마진율
  const saMR=saSales?(activeTypes.reduce((a,t)=>a+sm(saData,'Raw',t,'마진'),0)/saSales*100):null;
  const brMR=brSales?(activeTypes.reduce((a,t)=>a+sm(brData,'Raw',t,'마진'),0)/brSales*100):null;
  const el=document.getElementById('metricCompareGrid');
  if(el)el.innerHTML=
    mcItem('mc-blue','입고(MBO)',saComein||null,brComein||null,fComma,'대',true)+
    mcItem('mc-orange','RO개수',saCnt-1||null,brCnt-1||null,fComma,'건',true)+
    mcItem('mc-blue','공임비중',saLBR,brLBR,fPct,'%',true)+
    mcItem('mc-orange','마진율',saMR,brMR,fPct,'%',true);
}
let _lastPosArgs=null;
let _posChartFull=null;
function _openPosModal(){
  if(!_lastPosArgs)return;
  document.getElementById("pos-modal").classList.add("open");
  document.body.style.overflow="hidden";
  // 모달 캔버스에 동일한 차트 새로 그리기
  if(_posChartFull){_posChartFull.destroy();_posChartFull=null;}
  const canvas=document.getElementById("posChartFull");
  _posChartFull=_buildPosChart(canvas,_lastPosArgs.sas,_lastPosArgs.avgSales,_lastPosArgs.mCount);
}
function _closePosModal(){
  document.getElementById("pos-modal").classList.remove("open");
  document.body.style.overflow="";
  // 모달 차트만 제거 — 원본 posChart는 건드리지 않음
  if(_posChartFull){_posChartFull.destroy();_posChartFull=null;}
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")_closePosModal();});
function rPositioning(sas,avgSales,mCount){
  _lastPosArgs={sas,avgSales,mCount};
  if(charts.pos)charts.pos.destroy();
  charts.pos=_buildPosChart(document.getElementById('posChart'),sas,avgSales,mCount);
}
function _buildPosChart(canvas,sas,avgSales,mCount){
  const valid=sas.filter(s=>s.sales>0&&s.mr!==null);
  const generalSAs=valid.filter(s=>s.gubun!=='보험');
  const insureSAs=valid.filter(s=>s.gubun==='보험');
  const avgX=valid.length?(valid.reduce((a,s)=>a+(getSalesVal(s,selSalesTypes)/1e6/mCount),0)/valid.length):0;
  const avgY=valid.length?(valid.reduce((a,s)=>a+(s.mr||0),0)/valid.length):0;
  const mkDS=(label,color,list)=>({label,data:list.map(sa=>{
    const sv=getSalesVal(sa,selSalesTypes);
    const mg=getMarginVal(sa,selSalesTypes);
    const mr_=sv?(mg/sv*100):sa.mr;
    return{x:sv/1e6/mCount,y:mr_,name:sa.name,branch:sa.branch,sales:sv,mr:mr_,comein:sa.comein,gubun:sa.gubun};
  }),backgroundColor:color+'88',borderColor:color,borderWidth:1.5,pointRadius:7,pointHoverRadius:10});
  return new Chart(canvas,{type:'scatter',
    data:{datasets:[mkDS('일반','#2563eb',generalSAs),mkDS('보험','#7c3aed',insureSAs)]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},
      scales:{x:{...ax(),title:{display:true,text:'월평균매출 (백만원)',color:'#9da3b8',font:{size:10}},ticks:{...tk(),callback:v=>v+'M'}},y:{...ax(),title:{display:true,text:'마진율 (%)',color:'#9da3b8',font:{size:10}},ticks:{...tk(),callback:v=>v.toFixed(1)+'%'}}},
      plugins:{legend:{display:true,position:'bottom',labels:{color:'#5a6076',font:{size:11},boxWidth:10,padding:12}},
        tooltip:{backgroundColor:'#1a1d2e',borderColor:'#e2e7f2',borderWidth:1,titleColor:'#fff',bodyColor:'#9da3b8',
          callbacks:{title:items=>{const d=items[0].raw;return d.name+' ('+d.branch+(d.gubun?' · '+d.gubun:'')+')';},label:item=>{const d=item.raw;return['월평균매출: '+d.x.toFixed(0)+'M','마진율: '+d.y.toFixed(1)+'%','입고: '+(d.comein||0)+'대'];}}}}},
    plugins:[{id:'quadrant',
      beforeDraw(chart){const{ctx,chartArea:{left,right,top,bottom},scales:{x,y}}=chart;const px=x.getPixelForValue(avgX),py=y.getPixelForValue(avgY);ctx.save();
        ctx.fillStyle='rgba(5,150,105,0.04)';ctx.fillRect(px,top,right-px,py-top);
        ctx.fillStyle='rgba(37,99,235,0.04)';ctx.fillRect(left,top,px-left,py-top);
        ctx.fillStyle='rgba(217,119,6,0.04)';ctx.fillRect(px,py,right-px,bottom-py);
        ctx.fillStyle='rgba(220,38,38,0.04)';ctx.fillRect(left,py,px-left,bottom-py);ctx.restore();},
      afterDraw(chart){const{ctx,chartArea:{left,right,top,bottom},scales:{x,y}}=chart;const px=x.getPixelForValue(avgX),py=y.getPixelForValue(avgY);ctx.save();
        ctx.setLineDash([5,4]);ctx.lineWidth=1;ctx.strokeStyle='rgba(37,99,235,0.4)';ctx.beginPath();ctx.moveTo(px,top);ctx.lineTo(px,bottom);ctx.stroke();
        ctx.strokeStyle='rgba(220,38,38,0.4)';ctx.beginPath();ctx.moveTo(left,py);ctx.lineTo(right,py);ctx.stroke();ctx.setLineDash([]);
        ctx.font='10px DM Mono';ctx.fillStyle='rgba(37,99,235,0.6)';ctx.fillText('매출중앙 '+avgX.toFixed(1)+'M',px+5,top+13);
        ctx.fillStyle='rgba(220,38,38,0.6)';ctx.fillText('마진율중앙 '+avgY.toFixed(1)+'%',left+5,py-5);
        ctx.font='bold 10px Noto Sans KR';
        ctx.fillStyle='rgba(37,99,235,0.45)';ctx.fillText('저매출·고마진',left+8,top+20);
        ctx.fillStyle='rgba(5,150,105,0.55)';ctx.fillText('고매출·고마진',px+8,top+20);
        ctx.fillStyle='rgba(220,38,38,0.4)';ctx.fillText('저매출·저마진',left+8,bottom-8);
        ctx.fillStyle='rgba(217,119,6,0.55)';ctx.fillText('고매출·저마진',px+8,bottom-8);
        chart.data.datasets.forEach(ds=>{ds.data.forEach(d=>{const bx=x.getPixelForValue(d.x),by=y.getPixelForValue(d.y);ctx.font='11px Noto Sans KR';ctx.fillStyle='#1a1d2e';ctx.fillText(d.name,bx+9,by-3);});});
        ctx.restore();}}]});
}
function ax(){return{grid:{color:'#e2e7f2'},border:{color:'#e2e7f2'}}}
function tk(){return{color:'#9da3b8',font:{size:10,family:'DM Mono'}}}
function lo({yMin,yMax,sugMin,sugMax}={}){return{responsive:true,maintainAspectRatio:false,animation:{duration:400},scales:{x:{...ax(),ticks:tk()},y:{...ax(),min:yMin,max:yMax,suggestedMin:sugMin,suggestedMax:sugMax,ticks:tk()}},plugins:{legend:{labels:{color:'#5a6076',font:{size:10},boxWidth:10,padding:8}},tooltip:{backgroundColor:'#1a1d2e',borderColor:'#e2e7f2',borderWidth:1,titleColor:'#fff',bodyColor:'#9da3b8'}}};}
function dc(){Object.values(charts).forEach(c=>c&&c.destroy());charts={};}
window.onload=init;
</script>
