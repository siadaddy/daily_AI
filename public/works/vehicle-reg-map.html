<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW 등록 대수 지역 시각화 — DEMO</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080c14; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Header */
  .header {
    background: linear-gradient(135deg, rgba(28,105,212,0.15) 0%, rgba(10,14,26,0.95) 100%);
    border-bottom: 1px solid rgba(28,105,212,0.25);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: #1c69d4;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 13px; color: #fff; letter-spacing: -0.5px;
  }
  .header-title { font-size: 16px; font-weight: 700; color: #fff; }
  .header-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
  .demo-badge {
    margin-left: auto;
    background: rgba(28,105,212,0.2);
    border: 1px solid rgba(28,105,212,0.4);
    color: #60a5fa;
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 4px;
    letter-spacing: 1px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 0;
    background: #0d1117;
    border-bottom: 1px solid #1e293b;
  }
  .stat {
    flex: 1; padding: 10px 16px;
    border-right: 1px solid #1e293b;
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 18px; font-weight: 800; color: #1c69d4; font-family: monospace; }
  .stat-label { font-size: 10px; color: #64748b; margin-top: 1px; letter-spacing: 0.5px; }

  /* Map + controls layout */
  .map-container { position: relative; }
  #map { width: 100%; height: calc(100vh - 120px); min-height: 480px; background: #080c14; }

  /* Legend */
  .legend {
    position: absolute; bottom: 28px; left: 14px; z-index: 1000;
    background: rgba(8,12,20,0.92);
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 160px;
  }
  .legend-title { font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; letter-spacing: 0.5px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; color: #cbd5e1; }
  .legend-circle { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-divider { border: none; border-top: 1px solid #1e293b; margin: 8px 0; }
  .legend-marker-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.3); }

  /* Layer toggle */
  .layer-toggle {
    position: absolute; top: 14px; right: 14px; z-index: 1000;
    display: flex; gap: 6px;
  }
  .toggle-btn {
    background: rgba(8,12,20,0.9);
    border: 1px solid #1e293b;
    border-radius: 6px;
    color: #94a3b8;
    font-size: 11px; font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.active {
    background: rgba(28,105,212,0.2);
    border-color: #1c69d4;
    color: #60a5fa;
  }

  /* Tooltip */
  .leaflet-tooltip {
    background: rgba(8,12,20,0.95) !important;
    border: 1px solid #1e293b !important;
    border-radius: 8px !important;
    color: #e2e8f0 !important;
    padding: 10px 14px !important;
    font-family: 'Segoe UI', sans-serif !important;
    font-size: 13px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }
  .tt-title { font-weight: 700; color: #fff; font-size: 14px; }
  .tt-row { display: flex; justify-content: space-between; gap: 16px; margin-top: 4px; }
  .tt-key { color: #64748b; font-size: 11px; }
  .tt-val { color: #60a5fa; font-weight: 700; font-size: 12px; }

  /* Dealer popup */
  .leaflet-popup-content-wrapper {
    background: rgba(8,12,20,0.97) !important;
    border: 1px solid #1e293b !important;
    border-radius: 10px !important;
    color: #e2e8f0 !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip { background: rgba(8,12,20,0.97) !important; }
  .popup-title { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 8px; }
  .popup-badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; margin-left: 6px;
    vertical-align: middle;
  }
  .popup-row { display: flex; justify-content: space-between; gap: 20px; margin-top: 5px; }
  .popup-key { font-size: 11px; color: #64748b; }
  .popup-val { font-size: 12px; font-weight: 600; color: #e2e8f0; }

  /* Demo watermark */
  .watermark {
    position: fixed; bottom: 40px; right: 18px; z-index: 2000;
    font-size: 10px; color: rgba(100,116,139,0.5);
    letter-spacing: 2px; font-weight: 700;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">BMW</div>
  <div>
    <div class="header-title">차량 등록 대수 지역 시각화</div>
    <div class="header-sub">행정구역별 누적 등록 현황 · 시도 / 시군구 드릴다운</div>
  </div>
  <div class="demo-badge">DEMO</div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val">374,472</div><div class="stat-label">전국 누적 등록</div></div>
  <div class="stat"><div class="stat-val">17</div><div class="stat-label">시도</div></div>
  <div class="stat"><div class="stat-val">82</div><div class="stat-label">딜러 마커</div></div>
  <div class="stat"><div class="stat-val">2025.12</div><div class="stat-label">기준 월</div></div>
</div>

<div class="map-container">
  <div id="map"></div>

  <div class="layer-toggle">
    <button class="toggle-btn active" id="btn-sido" onclick="setLayer('sido')">시도</button>
    <button class="toggle-btn" id="btn-sgg" onclick="setLayer('sgg')">시군구</button>
  </div>

  <div class="legend">
    <div class="legend-title">등록 대수</div>
    <div class="legend-item"><div class="legend-circle" style="background:#1e3a5f"></div> ~ 9,999</div>
    <div class="legend-item"><div class="legend-circle" style="background:#1a4f8a"></div> 10,000 ~ 19,999</div>
    <div class="legend-item"><div class="legend-circle" style="background:#1c69d4"></div> 20,000 ~ 39,999</div>
    <div class="legend-item"><div class="legend-circle" style="background:#3b82f6"></div> 40,000 ~ 79,999</div>
    <div class="legend-item"><div class="legend-circle" style="background:#60a5fa"></div> 80,000+</div>
    <hr class="legend-divider">
    <div class="legend-title">딜러 유형</div>
    <div class="legend-marker-item"><div class="legend-dot" style="background:#1c69d4"></div>Full Service [F]</div>
    <div class="legend-marker-item"><div class="legend-dot" style="background:#a78bfa"></div>Mechanic [M]</div>
    <div class="legend-marker-item"><div class="legend-dot" style="background:#34d399"></div>Body&Paint [B]</div>
    <div class="legend-marker-item"><div class="legend-dot" style="background:#f59e0b"></div>SCL ★</div>
  </div>
</div>

<div class="watermark">DEMO DATA · NOT REAL</div>

<script>
// ── DEMO DATA ──────────────────────────────────────────────
const SIDO_DATA = [
  { name: '서울', lat: 37.5665, lng: 126.9780, reg: 85432, sgg_count: 25 },
  { name: '경기', lat: 37.4138, lng: 127.5183, reg: 112847, sgg_count: 31 },
  { name: '부산', lat: 35.1796, lng: 129.0756, reg: 38291, sgg_count: 16 },
  { name: '인천', lat: 37.4563, lng: 126.7052, reg: 29184, sgg_count: 10 },
  { name: '대구', lat: 35.8714, lng: 128.6014, reg: 22547, sgg_count: 8 },
  { name: '광주', lat: 35.1595, lng: 126.8526, reg: 15832, sgg_count: 5 },
  { name: '대전', lat: 36.3504, lng: 127.3845, reg: 18294, sgg_count: 5 },
  { name: '울산', lat: 35.5384, lng: 129.3114, reg: 12873, sgg_count: 5 },
  { name: '세종', lat: 36.4801, lng: 127.2890, reg: 4521, sgg_count: 1 },
  { name: '강원', lat: 37.8228, lng: 128.1555, reg: 11283, sgg_count: 18 },
  { name: '충북', lat: 36.8000, lng: 127.7000, reg: 9847, sgg_count: 11 },
  { name: '충남', lat: 36.5184, lng: 126.8000, reg: 13291, sgg_count: 15 },
  { name: '전북', lat: 35.7167, lng: 127.1531, reg: 10543, sgg_count: 14 },
  { name: '전남', lat: 34.8679, lng: 126.9910, reg: 8932, sgg_count: 22 },
  { name: '경북', lat: 36.4919, lng: 128.8889, reg: 15847, sgg_count: 23 },
  { name: '경남', lat: 35.4606, lng: 128.2132, reg: 18921, sgg_count: 18 },
  { name: '제주', lat: 33.4996, lng: 126.5312, reg: 7287, sgg_count: 2 },
];

// 시군구 (demo subset — 30 districts)
const SGG_DATA = [
  { name: '강남구', sido: '서울', lat: 37.5172, lng: 127.0473, reg: 14832 },
  { name: '서초구', sido: '서울', lat: 37.4836, lng: 127.0327, reg: 11247 },
  { name: '송파구', sido: '서울', lat: 37.5145, lng: 127.1059, reg: 9843 },
  { name: '마포구', sido: '서울', lat: 37.5638, lng: 126.9084, reg: 7231 },
  { name: '영등포구', sido: '서울', lat: 37.5261, lng: 126.8963, reg: 6148 },
  { name: '수원시', sido: '경기', lat: 37.2636, lng: 127.0286, reg: 12741 },
  { name: '성남시', sido: '경기', lat: 37.4201, lng: 127.1265, reg: 11832 },
  { name: '고양시', sido: '경기', lat: 37.6584, lng: 126.8320, reg: 10293 },
  { name: '용인시', sido: '경기', lat: 37.2411, lng: 127.1776, reg: 9847 },
  { name: '화성시', sido: '경기', lat: 37.1997, lng: 126.8314, reg: 7632 },
  { name: '해운대구', sido: '부산', lat: 35.1631, lng: 129.1636, reg: 8294 },
  { name: '남구', sido: '부산', lat: 35.1379, lng: 129.1013, reg: 6743 },
  { name: '북구', sido: '부산', lat: 35.1972, lng: 128.9897, reg: 5128 },
  { name: '연수구', sido: '인천', lat: 37.4106, lng: 126.6786, reg: 7841 },
  { name: '남동구', sido: '인천', lat: 37.4479, lng: 126.7310, reg: 6293 },
  { name: '수성구', sido: '대구', lat: 35.8588, lng: 128.6314, reg: 8431 },
  { name: '달서구', sido: '대구', lat: 35.8297, lng: 128.5326, reg: 6124 },
  { name: '유성구', sido: '대전', lat: 36.3624, lng: 127.3564, reg: 7293 },
  { name: '서구', sido: '대전', lat: 36.3553, lng: 127.3832, reg: 5841 },
  { name: '남구', sido: '울산', lat: 35.5384, lng: 129.3114, reg: 5192 },
  { name: '세종시', sido: '세종', lat: 36.4801, lng: 127.2890, reg: 4521 },
  { name: '춘천시', sido: '강원', lat: 37.8813, lng: 127.7298, reg: 3142 },
  { name: '원주시', sido: '강원', lat: 37.3422, lng: 127.9201, reg: 2847 },
  { name: '청주시', sido: '충북', lat: 36.6424, lng: 127.4890, reg: 4831 },
  { name: '천안시', sido: '충남', lat: 36.8151, lng: 127.1139, reg: 5293 },
  { name: '전주시', sido: '전북', lat: 35.8242, lng: 127.1480, reg: 4192 },
  { name: '창원시', sido: '경남', lat: 35.2280, lng: 128.6811, reg: 6843 },
  { name: '진주시', sido: '경남', lat: 35.1798, lng: 128.1076, reg: 3241 },
  { name: '포항시', sido: '경북', lat: 36.0190, lng: 129.3435, reg: 4831 },
  { name: '제주시', sido: '제주', lat: 33.4996, lng: 126.5312, reg: 5193 },
];

const DEALER_DATA = [
  { name: '딜러A 강남점', type: 'F', lat: 37.5172, lng: 127.0512, city: '서울 강남', reg_area: 14832 },
  { name: '딜러B 강서점', type: 'M', lat: 37.5509, lng: 126.8495, city: '서울 강서', reg_area: 8241 },
  { name: '딜러C 수원점', type: 'F', lat: 37.2700, lng: 127.0286, city: '경기 수원', reg_area: 12741 },
  { name: '딜러D 분당점', type: 'SCL', lat: 37.3840, lng: 127.1250, city: '경기 성남', reg_area: 11832 },
  { name: '딜러E 인천점', type: 'F', lat: 37.4106, lng: 126.6900, city: '인천 연수', reg_area: 7841 },
  { name: '딜러F 부산점', type: 'F', lat: 35.1631, lng: 129.1680, city: '부산 해운대', reg_area: 8294 },
  { name: '딜러G 부산서점', type: 'M', lat: 35.1972, lng: 128.9940, city: '부산 북구', reg_area: 5128 },
  { name: '딜러H 대구점', type: 'F', lat: 35.8588, lng: 128.6370, city: '대구 수성', reg_area: 8431 },
  { name: '딜러I 대전점', type: 'F', lat: 36.3624, lng: 127.3620, city: '대전 유성', reg_area: 7293 },
  { name: '딜러J 광주점', type: 'B', lat: 35.1531, lng: 126.8560, city: '광주 서구', reg_area: 6124 },
  { name: '딜러K 울산점', type: 'M', lat: 35.5450, lng: 129.3180, city: '울산 남구', reg_area: 5192 },
  { name: '딜러L 창원점', type: 'F', lat: 35.2320, lng: 128.6870, city: '경남 창원', reg_area: 6843 },
];

// ── COLOR HELPERS ──────────────────────────────────────────
function regColor(reg) {
  if (reg >= 80000) return '#60a5fa';
  if (reg >= 40000) return '#3b82f6';
  if (reg >= 20000) return '#1c69d4';
  if (reg >= 10000) return '#1a4f8a';
  return '#1e3a5f';
}

function regRadius(reg, isSido) {
  if (isSido) return Math.sqrt(reg) * 0.55;
  return Math.sqrt(reg) * 1.1;
}

const DEALER_COLORS = { F: '#1c69d4', M: '#a78bfa', B: '#34d399', SCL: '#f59e0b' };
const DEALER_LABELS = { F: 'Full Service', M: 'Mechanic', B: 'Body & Paint', SCL: 'Special Channel' };

function fmt(n) { return n.toLocaleString('ko-KR'); }

// ── MAP INIT ───────────────────────────────────────────────
const map = L.map('map', { center: [36.5, 127.8], zoom: 7, zoomControl: false });
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── LAYERS ─────────────────────────────────────────────────
let sidoLayer, sggLayer, dealerLayer;
let currentLayer = 'sido';

function makeSidoLayer() {
  const group = L.layerGroup();
  SIDO_DATA.forEach(d => {
    const circle = L.circle([d.lat, d.lng], {
      radius: regRadius(d.reg, true) * 500,
      color: regColor(d.reg),
      fillColor: regColor(d.reg),
      fillOpacity: 0.55,
      weight: 1.5,
    });
    const pct = ((d.reg / 374472) * 100).toFixed(1);
    circle.bindTooltip(`
      <div class="tt-title">${d.name}</div>
      <div class="tt-row"><span class="tt-key">등록 대수</span><span class="tt-val">${fmt(d.reg)} 대</span></div>
      <div class="tt-row"><span class="tt-key">전국 점유</span><span class="tt-val">${pct}%</span></div>
      <div class="tt-row"><span class="tt-key">시군구 수</span><span class="tt-val">${d.sgg_count}개</span></div>
    `, { sticky: true });
    group.addLayer(circle);

    const label = L.marker([d.lat, d.lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="font-size:11px;font-weight:700;color:#fff;text-shadow:0 0 4px #000,0 0 8px #000;white-space:nowrap;pointer-events:none;">${d.name}<br><span style="color:#60a5fa;font-size:10px;">${fmt(d.reg)}</span></div>`,
        iconAnchor: [0, 0]
      }),
      interactive: false
    });
    group.addLayer(label);
  });
  return group;
}

function makeSggLayer() {
  const group = L.layerGroup();
  SGG_DATA.forEach(d => {
    const circle = L.circle([d.lat, d.lng], {
      radius: regRadius(d.reg, false) * 300,
      color: regColor(d.reg),
      fillColor: regColor(d.reg),
      fillOpacity: 0.6,
      weight: 1,
    });
    const pct = ((d.reg / 374472) * 100).toFixed(2);
    circle.bindTooltip(`
      <div class="tt-title">${d.sido} ${d.name}</div>
      <div class="tt-row"><span class="tt-key">등록 대수</span><span class="tt-val">${fmt(d.reg)} 대</span></div>
      <div class="tt-row"><span class="tt-key">전국 점유</span><span class="tt-val">${pct}%</span></div>
    `, { sticky: true });
    group.addLayer(circle);
  });
  return group;
}

function makeDealerLayer() {
  const group = L.layerGroup();
  DEALER_DATA.forEach(d => {
    const color = DEALER_COLORS[d.type];
    const isSCL = d.type === 'SCL';
    const marker = L.circleMarker([d.lat, d.lng], {
      radius: isSCL ? 9 : 7,
      color: '#fff',
      fillColor: color,
      fillOpacity: 1,
      weight: isSCL ? 2.5 : 1.5,
    });
    marker.bindPopup(`
      <div class="popup-title">${d.name}
        <span class="popup-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">${d.type}</span>
      </div>
      <div class="popup-row"><span class="popup-key">위치</span><span class="popup-val">${d.city}</span></div>
      <div class="popup-row"><span class="popup-key">지역 유형</span><span class="popup-val">${DEALER_LABELS[d.type]}</span></div>
      <div class="popup-row"><span class="popup-key">권역 등록</span><span class="popup-val">${fmt(d.reg_area)} 대</span></div>
    `);
    group.addLayer(marker);
  });
  return group;
}

// ── LAYER CONTROL ─────────────────────────────────────────
function setLayer(type) {
  if (sidoLayer) map.removeLayer(sidoLayer);
  if (sggLayer) map.removeLayer(sggLayer);

  document.getElementById('btn-sido').classList.toggle('active', type === 'sido');
  document.getElementById('btn-sgg').classList.toggle('active', type === 'sgg');

  if (type === 'sido') {
    if (!sidoLayer) sidoLayer = makeSidoLayer();
    sidoLayer.addTo(map);
  } else {
    if (!sggLayer) sggLayer = makeSggLayer();
    sggLayer.addTo(map);
  }
  currentLayer = type;
}

// init
sidoLayer = makeSidoLayer();
sidoLayer.addTo(map);
dealerLayer = makeDealerLayer();
dealerLayer.addTo(map);
</script>
</body>
</html>
