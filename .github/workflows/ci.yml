name: ✅ CI (lint + test + build)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # 빌드 통과용 더미 값 — 실제 데이터 접근은 런타임(Vercel)에서만 발생
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: 테스트
        run: npm test

      - name: 빌드
        run: npm run build
