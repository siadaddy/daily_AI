name: 📰 AI 파이프라인 (수집 + 생성)

on:
  schedule:
    # 매일 21:00 UTC = 익일 06:00 KST
    - cron: "0 21 * * *"
  workflow_dispatch:   # 수동 트리거

jobs:
  collect:
    name: 🔍 뉴스 수집
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
      NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
      GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY_2:       ${{ secrets.GROQ_API_KEY_2 }}
      GROQ_API_KEY_3:       ${{ secrets.GROQ_API_KEY_3 }}
      GROQ_API_KEY_4:       ${{ secrets.GROQ_API_KEY_4 }}
      NTFY_TOPIC:           ${{ secrets.NTFY_TOPIC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: 의존성 설치
        run: pip install -r pipeline/requirements.txt

      - name: 뉴스 수집 실행
        run: python pipeline/collect.py

      - name: output 디렉터리 artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: pipeline/output/
          retention-days: 1

  generate:
    name: 🤖 콘텐츠 생성
    runs-on: ubuntu-latest
    needs: collect
    env:
      SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2:    ${{ secrets.GEMINI_API_KEY_2 }}
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEY_2:      ${{ secrets.GROQ_API_KEY_2 }}
      GROQ_API_KEY_3:      ${{ secrets.GROQ_API_KEY_3 }}
      GROQ_API_KEY_4:      ${{ secrets.GROQ_API_KEY_4 }}
      HF_TOKEN:            ${{ secrets.HF_TOKEN }}
      NTFY_TOPIC:          ${{ secrets.NTFY_TOPIC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: 의존성 설치
        run: pip install -r pipeline/requirements.txt

      - name: collect artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          name: pipeline-output
          path: pipeline/output/

      - name: 콘텐츠 생성 실행
        run: python pipeline/main.py

      - name: 실패 시 ntfy 알림
        if: failure()
        run: |
          curl -s -X POST https://ntfy.sh/ \
            -H "Content-Type: application/json" \
            -d "{\"topic\":\"$NTFY_TOPIC\",\"title\":\"❌ AI 파이프라인 실패\",\"message\":\"generate 단계 실패. GitHub Actions 로그 확인 필요.\",\"priority\":4,\"tags\":[\"warning\"]}"
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
